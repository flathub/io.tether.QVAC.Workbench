id: io.tether.QVAC.Workbench
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: run.sh
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
build-options:
  strip: false
  no-debuginfo: true
finish-args:
  - --share=ipc
  - --share=network
  - --socket=x11
  - --socket=pulseaudio
  - --device=dri
  - --talk-name=org.kde.StatusNotifierWatcher
  - --env=ELECTRON_TRASH=gio
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons
  - --talk-name=org.freedesktop.ScreenSaver
  - --persist=.config/pear
  - --persist=.qvac
modules:
  - name: qvac-workbench
    only-arches:
      - x86_64
    buildsystem: simple
    build-commands:
      - install -Dm644 io.tether.QVAC.Workbench.metainfo.xml /app/share/metainfo/io.tether.QVAC.Workbench.metainfo.xml
      - install -Dm644 io.tether.QVAC.Workbench.png /app/share/icons/hicolor/512x512/apps/io.tether.QVAC.Workbench.png
      - install -Dm644 io.tether.QVAC.Workbench.desktop /app/share/applications/io.tether.QVAC.Workbench.desktop
      - install -Dm755 run.sh $FLATPAK_DEST/bin/run.sh
      - cp -a main $FLATPAK_DEST/main
    sources:
      - type: archive
        url: https://static.tether.dev/qvac/workbench/flatpak-assets-0.5.0.tar.gz
        sha512: ebc159062894d6d38f02814560a98fa87bb2c1b5a2067a15073b1e8550d251fdadc6ef2499f7320ea9acbd0de272089cd3fd5f3f76d79921774a0da7d27b0614
        strip-components: 0
