id: io.tether.QVAC.Workbench
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
command: run.sh
base: org.electronjs.Electron2.BaseApp
base-version: "25.08"
build-options:
  strip: false
  no-debuginfo: true
finish-args:
  - --share=ipc
  - --share=network
  - --socket=x11
  - --socket=pulseaudio
  - --device=dri
  - --talk-name=org.kde.StatusNotifierWatcher
  - --env=ELECTRON_TRASH=gio
  - --env=GTK_USE_PORTAL=1
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons
  - --talk-name=org.freedesktop.ScreenSaver
  - --persist=.qvac-workbench
  - --persist=.qvac

modules:
  - name: obsidian
    only-arches:
      - x86_64
    buildsystem: simple
    build-commands:
      - ar x obsidian.deb
      - tar xf data.tar.*
      - cp -a opt/Obsidian /app/obsidian
      - rm -f /app/obsidian/chrome-sandbox
      - install -Dm755 obsidian-wrapper /app/bin/obsidian
    sources:
      - type: file
        url: https://github.com/obsidianmd/obsidian-releases/releases/download/v1.12.7/obsidian_1.12.7_amd64.deb
        sha256: 3644e3ef19bcd23db4d17f7c73311b5245429391a2a48b361da93375f59712b0
        dest-filename: obsidian.deb
      - type: script
        dest-filename: obsidian-wrapper
        commands:
          - exec /app/obsidian/obsidian-cli "$@"

  # --- QVAC Workbench (packaged Electron app + desktop integration) ---
  # The archive source is extracted by flatpak-builder before build commands run.
  - name: qvac-workbench
    only-arches:
      - x86_64
    buildsystem: simple
    build-commands:
      - |
        if ! grep -q 'type="vcs-browser"' io.tether.QVAC.Workbench.metainfo.xml; then
          sed -i 's|</component>|  <url type="vcs-browser">https://github.com/flathub/io.tether.QVAC.Workbench</url>\n</component>|' io.tether.QVAC.Workbench.metainfo.xml
        fi
      - install -Dm644 io.tether.QVAC.Workbench.metainfo.xml /app/share/metainfo/io.tether.QVAC.Workbench.metainfo.xml
      - install -Dm644 io.tether.QVAC.Workbench.png /app/share/icons/hicolor/512x512/apps/io.tether.QVAC.Workbench.png
      - install -Dm644 io.tether.QVAC.Workbench.desktop /app/share/applications/io.tether.QVAC.Workbench.desktop
      - install -Dm755 run.sh /app/bin/run.sh
      - cp -a main /app/main
    sources:
      - type: archive
        url: https://static.tether.dev/qv.ac/0.11.0/QV.AC-x64-flatpak.tar.gz
        sha512: 240bb3c2c8d8df5fccf67a59893eb794906c7c4eaf3b5248c4e975bf6e3072ab02e89d9fa0365cdfc0de8406c1a93a95be3c33b0545b16d3cbca21f92479f697
        strip-components: 0
        x-checker-data:
          type: rotating-url
          url: https://static.tether.dev/qv.ac/latest/QV.AC-x64-flatpak.tar.gz
